version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: tax-system-postgres
    environment:
      POSTGRES_DB: tax_system_db
      POSTGRES_USER: taxuser
      POSTGRES_PASSWORD: taxpass123
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - tax-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taxuser -d tax_system_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Spring Boot Application
  backend:
    build: ./backend
    container_name: tax-system-backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tax_system_db
      SPRING_DATASOURCE_USERNAME: taxuser
      SPRING_DATASOURCE_PASSWORD: taxpass123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tax-network
    restart: unless-stopped

  # Frontend React Application
  frontend:
    build: ./frontend
    container_name: tax-system-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - tax-network
    restart: unless-stopped

  # Optional: PGAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: tax-system-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@tax.gov
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - tax-network
    restart: unless-stopped

networks:
  tax-network:
    driver: bridge

volumes:
  postgres_data: