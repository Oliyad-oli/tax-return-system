spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/tax_system_db}
    username: ${SPRING_DATASOURCE_USERNAME:taxuser}
    password: ${SPRING_DATASOURCE_PASSWORD:taxpass123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20

  jackson:
    serialization:
      fail-on-empty-beans: false

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

logging:
  level:
    com.taxsystem: DEBUG
    org.springframework.web: INFO
    org.hibernate: WARN